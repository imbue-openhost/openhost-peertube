[app]
name = "peertube"
version = "0.1.0"
description = "PeerTube federated video platform: Postgres + Redis + PeerTube + ffmpeg in one container"

[runtime.container]
image = "Dockerfile"
# Container port 9000 is the auth-proxy SSO sidecar — see
# auth_proxy.py.  It forwards anonymous + federation traffic
# unchanged to Caddy on loopback :9090, which rewrites the Host
# header from X-Forwarded-Host (the OpenHost router strips Host)
# before forwarding to PeerTube on loopback :9001.  For owner
# requests with a valid zone_auth cookie, the sidecar bounces the
# browser to /plugins/auth-openhost-sso/router/auto-login — a
# route exposed by the bundled
# ``peertube-plugin-auth-openhost-sso`` plugin (installed by
# start.sh on first boot via the standard PeerTube admin API).
# The plugin verifies the JWT and calls PeerTube's native
# ``userAuthenticated`` external-auth helper, which mints a
# one-time externalAuthToken and redirects to /login — and the
# SPA's ordinary login flow takes over from there.
# PeerTube reads PEERTUBE_TRUST_PROXY=['127.0.0.1','loopback']
# (set in start.sh) so it honours the X-Forwarded-* headers the
# router stamps onto the request.
port = 9000

[routing]
health_check = "/api/v1/ping"
# PeerTube federates over ActivityPub: every endpoint must be
# reachable without an OpenHost auth gate or remote instances
# can't fetch our actor objects, video metadata, or comments.
# Login is enforced inside PeerTube itself.
public_paths = ["/"]

[resources]
# Headroom budget at idle:
#   * postgres ~300 MiB  (start.sh writes shared_buffers = 256 MB)
#   * redis    ~80  MiB  (maxmemory 256 MB cap, idle around 80)
#   * peertube ~600 MiB  (node 22 + queue workers)
#   * ffmpeg   spikes during transcode jobs
# 4 GiB headroom: ~1 GiB baseline above + ~3 GiB for ffmpeg.
# 4K (2160p) AV1 -> h264 transcoding under fluent-ffmpeg with
# libdav1d decode + libx264 encode + a 1024-frame muxing queue
# easily peaks above 1.5 GiB resident, and an earlier 2 GiB cap
# tripped the cgroup OOM-killer mid-encode (SIGKILL with no
# ffmpeg-internal error) within seconds of the worker starting
# the optimize-job for a 4K upload.  3 GiB of ffmpeg headroom
# also covers concurrent HLS resolution rungs that PeerTube
# enqueues after the optimize step.
memory_mb = 4096
# Transcoding is CPU-bound. 2000m allows two parallel ffmpeg
# encoding threads without starving the node event loop.
cpu_millicores = 2000

[data]
# Persistent: Postgres data dir, Redis AOF/RDB, video files,
# thumbnails, captions, plugin configs, generated secrets.
app_data = true
# Scratch: temp upload dirs, transcoding work files. These are
# safe to lose on container restart and fill up fast during
# upload; keeping them off the persistent disk is intentional.
app_temp_data = true
